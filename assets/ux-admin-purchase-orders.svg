<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">Admin UI purchase orders</title>
  <desc id="desc">A purchase order management screen with approvals, suppliers and budget impact.</desc>
  <rect width="980" height="620" rx="26" fill="#f8f5ee"/>
  <rect x="22" y="22" width="936" height="576" rx="18" fill="#ffffff" stroke="#ded4c4"/>
  <rect x="22" y="22" width="936" height="58" rx="18" fill="#174d3a"/>
  <text x="54" y="58" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="850">Avial Admin</text>
  <text x="210" y="58" fill="#8fb09e" font-family="Inter, Arial, sans-serif" font-size="13">Members</text>
  <text x="292" y="58" fill="#8fb09e" font-family="Inter, Arial, sans-serif" font-size="13">Teams</text>
  <text x="358" y="58" fill="#d2dfd7" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Finance</text>
  <text x="54" y="126" fill="#13251d" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="850">Purchase Orders</text>
  <text x="54" y="153" fill="#6f7b86" font-family="Inter, Arial, sans-serif" font-size="15">Raise, approve and track club expenses with clear ownership.</text>
