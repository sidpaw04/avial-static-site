<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" role="img" aria-labelledby="title desc">
  <title id="title">Avial mobile app home screen</title>
  <desc id="desc">A polished mobile app home screen showing club events, availability, payments and notices.</desc>
  <defs>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#174d3a"/>
      <stop offset="1" stop-color="#123427"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2f24" flood-opacity=".10"/>
    </filter>
  </defs>

  <rect width="390" height="844" rx="46" fill="#141922"/>
  <rect x="9" y="9" width="372" height="826" rx="38" fill="#f7f2e9"/>
  <rect x="154" y="23" width="82" height="6" rx="3" fill="#252c35"/>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="22" y="38" width="346" height="202" rx="28" fill="url(#top)"/>
    <text x="42" y="70" fill="#cfded6" font-size="12" font-weight="600">9:41</text>
    <circle cx="326" cy="66" r="17" fill="#ffffff" opacity=".14"/>
    <path d="M321 65h10M326 60v10" stroke="#ffffff" stroke-width="1.7" stroke-linecap="round" opacity=".76"/>

    <text x="42" y="116" fill="#c9d8d0" font-size="13" font-weight="500">Avial Sports Club</text>
    <text x="42" y="145" fill="#ffffff" font-size="25" font-weight="760">Good afternoon, Alex</text>
    <text x="42" y="172" fill="#d9e5df" font-size="14" font-weight="450">2 items need your attention today</text>

    <rect x="42" y="194" width="92" height="28" rx="14" fill="#ffffff" opacity=".14"/>
    <text x="58" y="212" fill="#ffffff" font-size="12" font-weight="650">Available</text>
    <rect x="144" y="194" width="82" height="28" rx="14" fill="#ffffff" opacity=".10"/>
    <text x="160" y="212" fill="#d9e5df" font-size="12" font-weight="550">1st XI</text>

    <text x="24" y="281" fill="#13251d" font-size="18" font-weight="720">Up next</text>
    <rect x="24" y="296" width="342" height="112" rx="22" fill="#ffffff" filter="url(#soft)"/>
    <rect x="44" y="318" width="48" height="58" rx="15" fill="#edf4ef"/>
    <text x="60" y="341" fill="#174d3a" font-size="11" font-weight="700">JUN</text>
    <text x="57" y="367" fill="#174d3a" font-size="25" font-weight="760">25</text>
    <text x="112" y="330" fill="#748176" font-size="11" font-weight="650">CRICKET - 1ST XI</text>
    <text x="112" y="355" fill="#13251d" font-size="18" font-weight="730">vs Harton CC</text>
    <text x="112" y="378" fill="#68756c" font-size="13" font-weight="430">Home Ground - 13:00</text>
    <rect x="282" y="324" width="56" height="25" rx="12.5" fill="#e0f0e7"/>
    <text x="296" y="341" fill="#174d3a" font-size="11" font-weight="700">Open</text>

    <text x="24" y="452" fill="#13251d" font-size="18" font-weight="720">Availability request</text>
    <rect x="24" y="467" width="342" height="118" rx="22" fill="#ffffff"/>
    <text x="46" y="500" fill="#13251d" font-size="16" font-weight="700">Sunday Training Camp</text>
    <text x="46" y="523" fill="#6f7b86" font-size="13" font-weight="420">Central Park - Sunday 5 July</text>
    <rect x="46" y="542" width="136" height="34" rx="17" fill="#f3eee7" stroke="#ddd3c5"/>
    <text x="78" y="564" fill="#637066" font-size="12" font-weight="650">Unavailable</text>
    <rect x="194" y="542" width="136" height="34" rx="17" fill="#174d3a"/>
    <text x="238" y="564" fill="#ffffff" font-size="12" font-weight="650">Available</text>

    <text x="24" y="630" fill="#13251d" font-size="18" font-weight="720">Payments</text>
    <rect x="24" y="645" width="162" height="94" rx="21" fill="#ffffff"/>
    <text x="46" y="675" fill="#748176" font-size="11" font-weight="650">OUTSTANDING</text>
    <text x="46" y="711" fill="#13251d" font-size="28" font-weight="730">GBP 15</text>
    <rect x="204" y="645" width="162" height="94" rx="21" fill="#ffffff"/>
    <text x="226" y="675" fill="#748176" font-size="11" font-weight="650">SUBSCRIPTION</text>
    <text x="226" y="711" fill="#13251d" font-size="28" font-weight="730">Paid</text>

    <rect x="24" y="766" width="342" height="54" rx="27" fill="#ffffff"/>
    <g fill="#174d3a">
